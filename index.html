<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Javier Jácome | Vive Motos Suzuki</title>

<!-- ICONOS -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,1,0" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --red:#e50043;
  --blue:#003da5;
  --wa:#25D366;
  --text:#fff;
  --muted:#cfd6e6;
}

body{
  font-family: system-ui;
  background:#000;
  color:#fff;
  padding-bottom:90px;
}

/* FONDO */
.bg{
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.9)),
    radial-gradient(circle at top left, rgba(229,0,67,.2), transparent),
    radial-gradient(circle at bottom right, rgba(0,61,165,.2), transparent),
    url('fondo.jpg') center/cover no-repeat;
  z-index:-1;
}

/* CARD */
.container{
  max-width:420px;
  margin:auto;
  padding:16px;
}

.card{
  background: rgba(10,10,12,.85);
  backdrop-filter: blur(16px);
  border-radius:28px;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 25px 60px rgba(0,0,0,.7);
}

/* HERO */
.hero{
  text-align:center;
  padding:30px 20px;
}

/* 🔥 LOGO CORREGIDO */
.logo-wrap{
  width:110px;
  height:110px;
  margin:0 auto 14px;
  border-radius:24px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 10px 25px rgba(0,0,0,.6);
}

.logo{
  width:80%;
  height:80%;
  object-fit:contain;
}

h1{font-size:24px}

.company{
  color:#7fa9ff;
  font-weight:bold;
}

.subtitle{
  font-size:14px;
  color:var(--muted);
  margin-top:10px;
}

/* BOTONES APP */
.app-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin:16px 0;
}

.app-btn{
  height:64px;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  text-decoration:none;
  font-size:28px;
  transition:.25s;
  box-shadow:0 10px 25px rgba(0,0,0,.4);
}

.app-btn:hover{
  transform:scale(1.05);
}

.call{background:linear-gradient(135deg,var(--red),#b80036)}
.wa{background:linear-gradient(135deg,#2ee86f,#25D366)}
.mail{background:rgba(255,255,255,.1)}

/* SECCIONES */
.section{
  background:rgba(255,255,255,.05);
  padding:14px;
  border-radius:16px;
  margin-bottom:10px;
}

.section h2{
  color:#7fa9ff;
  font-size:14px;
  margin-bottom:10px;
}

.chips{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.chip{
  padding:6px 10px;
  border-radius:20px;
  background:rgba(0,61,165,.2);
  font-size:12px;
}

/* REDES */
.socials{
  display:flex;
  justify-content:center;
  gap:16px;
}

.social{
  width:60px;
  height:60px;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  color:#fff;
  text-decoration:none;
  transition:.25s;
}

.social:hover{
  transform:scale(1.1);
}

.instagram{
  background:linear-gradient(45deg,#833ab4,#fd1d1d,#fcb045);
}

.facebook{
  background:#1877f2;
}

/* UBICACION */
.location{
  display:flex;
  justify-content:center;
}

.location a{
  width:60px;
  height:60px;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--blue);
  color:#fff;
  font-size:28px;
  text-decoration:none;
}

/* FOOTER */
.brand{
  text-align:center;
  font-size:12px;
  margin-top:10px;
  color:#aaa;
  text-decoration:none;
}

/* STICKY */
.sticky{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:10px;
  background:rgba(0,0,0,.85);
}

</style>
</head>

</div>

</html>
