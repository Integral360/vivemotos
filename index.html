<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Javier Jácome | Vive Motos Suzuki</title>

  <style>
    * { box-sizing: border-box; }

    :root {
      --suzuki-red: #e50043;
      --suzuki-blue: #003da5;
      --wa: #25D366;
      --text: #ffffff;
      --muted: #cfd6e6;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: #000;
      padding-bottom: 95px;
    }

    .hero-bg {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
        linear-gradient(135deg, rgba(229,0,67,0.25), rgba(0,61,165,0.2)),
        url('fondo.jpg') center/cover no-repeat;
      z-index: -1;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 16px;
    }

    .card {
      background: rgba(10,10,12,0.88);
      backdrop-filter: blur(12px);
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: fadeUp .8s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero {
      text-align: center;
      padding: 30px 20px;
    }

    .logo {
      width: 110px;
      height: 110px;
      background: #fff;
      border-radius: 20px;
      padding: 10px;
      object-fit: contain;
      margin-bottom: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
    }

    h1 {
      margin: 0;
      font-size: 26px;
    }

    .company {
      color: #7fa9ff;
      font-weight: bold;
      margin-top: 5px;
    }

    .role {
      color: var(--muted);
      font-size: 14px;
    }

    .content {
      padding: 18px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .btn {
      padding: 14px;
      border-radius: 14px;
      text-align: center;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-call {
      background: linear-gradient(135deg, var(--suzuki-red), #b80036);
      color: #fff;
    }

    .btn-wa {
      background: var(--wa);
      color: #fff;
    }

    .btn-outline {
      background: rgba(0,61,165,0.2);
      color: #dbe7ff;
      display: block;
      margin: 10px auto 15px;
      max-width: 70%;
    }

    .section {
      background: rgba(255,255,255,0.04);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .section h2 {
      margin: 0 0 10px;
      color: #7fa9ff;
      font-size: 15px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0,61,165,0.2);
      color: #dbe7ff;
      font-size: 12px;
    }

    .location-btn {
      background: var(--suzuki-blue);
      color: #fff;
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      text-decoration: none;
      display: block;
      margin-top: 10px;
    }

    .brand {
      text-align: center;
      font-size: 12px;
      margin-top: 10px;
      color: #aaa;
      text-decoration: none;
    }

    .brand strong {
      color: #7fa9ff;
    }

    .sticky {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px;
      background: rgba(0,0,0,0.9);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .sticky a {
      padding: 14px;
      text-align: center;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
    }

    .call { background: var(--suzuki-red); color: #fff; }
    .wa { background: var(--wa); color: #fff; }

  </style>
</head>

<body>

<div class="hero-bg"></div>

<div class="container">
  <div class="card">

    <div class="hero">
      <img src="foto.png" class="logo">
      <h1>Javier Jácome</h1>
      <div class="company">Vive Motos Suzuki</div>
      <div class="role">Asesor Comercial</div>
    </div>

    <div class="content">

      <div class="actions">
        <a href="tel:+573173763424" class="btn btn-call">📞 Llamar</a>
        <a href="https://wa.me/573173763424" class="btn btn-wa">💬 WhatsApp</a>
      </div>

      <a href="mailto:vivemotossuzukiipiales@gmail.com" class="btn btn-outline">✉️ Email</a>

      <div class="section">
        <h2>Servicios</h2>
        <div class="chips">
          <span class="chip">Motos Nuevas</span>
          <span class="chip">Repuestos</span>
          <span class="chip">Accesorios</span>
          <span class="chip">Taller</span>
        </div>
      </div>

      <div class="section">
        <h2>Ubicación</h2>
        <a href="https://maps.app.goo.gl/Snb7SffiaRzoCzRv6" class="location-btn">
          📍 Ver ubicación
        </a>
      </div>

      <a href="https://integral360.com.co" class="brand">
        Powered by <strong>Integral360</strong>
      </a>

    </div>

  </div>
</div>

<div class="sticky">
  <a href="tel:+573173763424" class="call">📞 Contactar</a>
  <a href="https://wa.me/573173763424" class="wa">💬 WhatsApp</a>
</div>

</body>
</html>
