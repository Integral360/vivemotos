<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Javier Jácome | Vive Motos Suzuki</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --red:#e50043;
  --blue:#003da5;
  --wa:#25D366;
  --glass:rgba(255,255,255,.06);
  --text:#fff;
}

body{
  font-family: system-ui;
  color: var(--text);
  background:#000;
  padding-bottom:90px;
}

/* FONDO */
.bg{
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.9)),
    radial-gradient(circle at top left, rgba(229,0,67,.2), transparent),
    radial-gradient(circle at bottom right, rgba(0,61,165,.2), transparent),
    url('fondo.jpg') center/cover no-repeat;
  z-index:-1;
}

/* CARD */
.container{
  max-width:420px;
  margin:auto;
  padding:16px;
}

.card{
  background: rgba(10,10,12,.85);
  backdrop-filter: blur(16px);
  border-radius:28px;
  border:1px solid rgba(255,255,255,.08);
  overflow:hidden;
}

/* HERO */
.hero{
  text-align:center;
  padding:30px 20px;
}

.logo{
  width:100px;
  height:100px;
  background:#fff;
  border-radius:22px;
  padding:10px;
  margin-bottom:12px;
}

h1{font-size:24px}

.company{
  color:#7fa9ff;
  font-weight:bold;
}

.subtitle{
  font-size:14px;
  color:#cfd6e6;
  margin-top:10px;
}

/* BOTONES */
.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:15px 0;
}

.btn{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  padding:14px;
  border-radius:16px;
  text-decoration:none;
  font-weight:bold;
}

.call{background:var(--red)}
.wa{background:var(--wa)}

.btn-outline{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:12px;
  border-radius:14px;
  background:var(--glass);
  text-decoration:none;
  color:#fff;
  margin-bottom:15px;
}

/* REDES TIPO APP */
.socials{
  display:flex;
  justify-content:center;
  gap:16px;
  margin-top:10px;
}

.social-app{
  width:58px;
  height:58px;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  transition:.25s;
  box-shadow: 0 10px 25px rgba(0,0,0,.5);
}

.social-app:hover{
  transform:scale(1.08);
}

/* COLORES */
.instagram{
  background: linear-gradient(45deg,#833ab4,#fd1d1d,#fcb045);
}

.facebook{
  background:#1877f2;
}

/* ICONOS */
.icon{
  width:26px;
  height:26px;
  fill:#fff;
}

/* SECCIONES */
.section{
  background:var(--glass);
  padding:14px;
  border-radius:16px;
  margin-bottom:10px;
}

.chips{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.chip{
  padding:6px 10px;
  border-radius:20px;
  background:rgba(0,61,165,.2);
  font-size:12px;
}

/* UBICACION */
.location{
  display:block;
  text-align:center;
  padding:12px;
  background:var(--blue);
  border-radius:12px;
  text-decoration:none;
  color:#fff;
}

/* FOOTER */
.brand{
  text-align:center;
  font-size:12px;
  margin-top:10px;
  color:#aaa;
  text-decoration:none;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">
<div class="card">

<div class="hero">
  <img src="foto.png" class="logo">
  <h1>Javier Jácome</h1>
  <div class="company">Vive Motos Suzuki</div>
  <div class="subtitle">
    Descubre el mundo de las motos Suzuki en Ipiales. ¡Pasión por las motos!
  </div>
</div>

<div class="content">

<div class="actions">
  <a href="tel:+573173763424" class="btn call">📞</a>
  <a href="https://wa.me/573173763424" class="btn wa">💬</a>
</div>

<a href="mailto:vivemotossuzukiipiales@gmail.com" class="btn-outline">
✉️ Email
</a>

<div class="section">
<h2>Servicios</h2>
<div class="chips">
<span class="chip">Motos Nuevas</span>
<span class="chip">Repuestos</span>
<span class="chip">Accesorios</span>
<span class="chip">Taller</span>
</div>
</div>

<div class="section">
<h2>Redes</h2>

<div class="socials">

  </svg>
</a>

<a href="https://www.facebook.com/vivemotossuzuki.ipiales/" class="social-app facebook">
  <svg class="icon" viewBox="0 0 24 24">
    <path d="M13.5 22v-8h2.7l.4-3h-3.1V9.1c0-.87.24-1.46 1.49-1.46H16.7V4.96c-.3-.04-1.35-.12-2.57-.12-2.54 0-4.28 1.55-4.28 4.4V11H7v3h2.85v8h3.65z"/>
  </svg>
</a>

</div>

</div>

<div class="section">
<h2>Ubicación</h2>
<a href="https://maps.app.goo.gl/Snb7SffiaRzoCzRv6" class="location">
📍 Ver ubicación

</div>

<a href="https://integral360.com.co" class="brand">
Powered by <strong>Integral360</strong>
</a>

</div>
</div>
</div>

</body>
</html>
